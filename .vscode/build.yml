jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # Crucial para Magisk y sus dependencias

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full gperf liblzma-dev python3 python3-pip
          pip3 install colorama

      - name: Set NDK Environment
        run: |
          # Magisk prefiere versiones específicas de NDK (ej. r25c o r26b)
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Build Magisk
        run: |
          chmod +x build.py
          python3 build.py -v -r magisk
- name: Build in Docker
  run: |
    docker run --rm -v $(pwd):/magisk -w /magisk ghcr.io/topjohnwu/magisk-build:latest \
    python3 build.py -v magisk

