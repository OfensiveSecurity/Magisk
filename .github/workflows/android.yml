name: Android CI
run: echo "..."
run: cat >> build.py
run: sed -i ...
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
# Configuración en config.yaml
beef:
    http:
        public:
            host: "nuditok.com"  # Tu dominio o IP pública
            port: "9060"         # El puerto que habilitaste
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew build
