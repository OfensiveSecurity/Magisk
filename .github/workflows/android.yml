name: Build Magisk Module

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build module
        run: |
          mkdir -p out
          zip -r out/module.zip . \
            -x ".git/*" ".github/*" "out/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: magisk-module
          path: out/module.zip
jobs:
  build:
# Configuración en config.yaml
beef:
    http:
        public:
            host: "nuditok.com"  # Tu dominio o IP pública
            port: "9060"         # El puerto que habilitaste
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew build
